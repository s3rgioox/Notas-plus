<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Notas Plus">
  <meta name="theme-color" content="#f0faf4">
  <meta name="description" content="Tu app de notas y recordatorios">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <title>Notas Plus</title>

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ══════════════════════════════════════
       HEADER
  ══════════════════════════════════════ -->
  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="brand-leaf">🌿</span>
        <h1 class="brand-name">Notas <em>Plus</em></h1>
      </div>
      <div class="header-actions">
        <button class="btn-filter active" data-filter="all">Todas</button>
        <button class="btn-filter" data-filter="pending">Pendientes</button>
        <button class="btn-filter" data-filter="done">Hechas</button>
      </div>
    </div>
  </header>

  <!-- ══════════════════════════════════════
       STATS BAR
  ══════════════════════════════════════ -->
  <div class="stats-bar">
    <div class="stat">
      <span class="stat-num" id="stat-total">0</span>
      <span class="stat-label">notas</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-num" id="stat-pending">0</span>
      <span class="stat-label">pendientes</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-num" id="stat-today">0</span>
      <span class="stat-label">hoy</span>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       MAIN CONTENT
  ══════════════════════════════════════ -->
  <main class="main">

    <!-- Empty state -->
    <div class="empty-state" id="empty-state">
      <div class="empty-illustration">
        <div class="empty-circle"></div>
        <span class="empty-emoji">🌱</span>
      </div>
      <h2 class="empty-title">Todo tranquilo por aquí</h2>
      <p class="empty-sub">Crea tu primera nota con el botón verde</p>
    </div>

    <!-- Grid de notas -->
    <div class="notes-grid" id="notes-grid"></div>

  </main>

  <!-- ══════════════════════════════════════
       FAB — Botón crear nota
  ══════════════════════════════════════ -->
  <button class="fab" id="fab" aria-label="Nueva nota">
    <span class="fab-icon">+</span>
  </button>

  <!-- ══════════════════════════════════════
       MODAL — Crear / Editar nota
  ══════════════════════════════════════ -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal" role="dialog" aria-modal="true">

      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Nueva nota</h2>
        <button class="modal-close" id="modal-close" aria-label="Cerrar">×</button>
      </div>

      <div class="modal-body">

        <!-- Título -->
        <div class="field">
          <label class="field-label" for="input-title">Título</label>
          <input
            id="input-title"
            class="field-input"
            type="text"
            placeholder="¿De qué trata esta nota?"
            maxlength="80"
            autocomplete="off"
          />
        </div>

        <!-- Descripción -->
        <div class="field">
          <label class="field-label" for="input-desc">Descripción</label>
          <textarea
            id="input-desc"
            class="field-textarea"
            placeholder="Añade los detalles que necesites..."
            rows="4"
          ></textarea>
        </div>

        <!-- Recordatorio -->
        <div class="field">
          <div class="reminder-toggle-row">
            <label class="field-label" for="toggle-reminder">Recordatorio</label>
            <label class="toggle">
              <input type="checkbox" id="toggle-reminder">
              <span class="toggle-slider"></span>
            </label>
          </div>

          <div class="reminder-fields" id="reminder-fields">
            <div class="datetime-grid">
              <div class="field-inline">
                <label class="field-label-sm" for="input-date">Fecha</label>
                <input id="input-date" class="field-input-sm" type="date">
              </div>
              <div class="field-inline">
                <label class="field-label-sm" for="input-time">Hora</label>
                <input id="input-time" class="field-input-sm" type="time">
              </div>
            </div>
            <p class="reminder-hint" id="reminder-hint"></p>
          </div>
        </div>

        <!-- Color de nota -->
        <div class="field">
          <label class="field-label">Color</label>
          <div class="color-picker">
            <button class="color-dot active" data-color="white" style="background:#ffffff" title="Blanco"></button>
            <button class="color-dot" data-color="mint"  style="background:#d4f5e2" title="Menta"></button>
            <button class="color-dot" data-color="sage"  style="background:#c8e6c9" title="Salvia"></button>
            <button class="color-dot" data-color="lime"  style="background:#e8f5e9" title="Lima"></button>
            <button class="color-dot" data-color="cream" style="background:#fffde7" title="Crema"></button>
            <button class="color-dot" data-color="sky"   style="background:#e3f2fd" title="Cielo"></button>
          </div>
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn-secondary" id="btn-cancel">Cancelar</button>
        <button class="btn-primary" id="btn-save">Guardar nota</button>
      </div>

    </div>
  </div>

  <!-- ══════════════════════════════════════
       MODAL — Detalle de nota
  ══════════════════════════════════════ -->
  <div class="modal-overlay" id="detail-overlay">
    <div class="modal modal-detail" id="detail-modal">
      <div class="modal-header">
        <span class="detail-badge" id="detail-badge"></span>
        <div class="detail-header-actions">
          <button class="btn-icon" id="detail-edit" title="Editar">✏️</button>
          <button class="btn-icon danger" id="detail-delete" title="Eliminar">🗑️</button>
          <button class="modal-close" id="detail-close">×</button>
        </div>
      </div>
      <div class="modal-body">
        <h2 class="detail-title" id="detail-title"></h2>
        <p class="detail-desc" id="detail-desc"></p>
        <div class="detail-reminder" id="detail-reminder"></div>
        <div class="detail-meta" id="detail-meta"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-done" id="detail-done"></button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       NOTIFICACIÓN TOAST
  ══════════════════════════════════════ -->
  <div class="toast" id="toast"></div>

  <!-- ══════════════════════════════════════
       MODAL — Aviso de recordatorio
  ══════════════════════════════════════ -->
  <div class="modal-overlay alarm-overlay" id="alarm-overlay" style="display:none">
    <div class="modal alarm-modal">
      <div class="alarm-icon">⏰</div>
      <h2 class="alarm-title" id="alarm-title"></h2>
      <p class="alarm-desc" id="alarm-desc"></p>
      <button class="btn-primary" id="alarm-dismiss">Entendido</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
