<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Notas Plus">
  <meta name="theme-color" content="#f0faf4">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Notas Plus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ══════════════════════════════════════
       PANTALLA AUTH (login / registro)
  ══════════════════════════════════════ -->
  <div class="auth-screen" id="auth-screen">
    <div class="auth-card">
      <div class="auth-brand">
        <span class="brand-leaf">🌿</span>
        <h1 class="brand-name">Notas <em>Plus</em></h1>
      </div>
      <p class="auth-tagline">Tus notas, siempre contigo</p>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login">Entrar</button>
        <button class="auth-tab" id="tab-register">Crear cuenta</button>
      </div>

      <!-- Login -->
      <div class="auth-form" id="form-login">
        <div class="field">
          <label class="field-label">Correo electrónico</label>
          <input id="login-email" class="field-input" type="email" placeholder="tu@correo.com" autocomplete="email">
        </div>
        <div class="field">
          <label class="field-label">Contraseña</label>
          <input id="login-password" class="field-input" type="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn-forgot" id="btn-forgot">¿Olvidaste tu contraseña?</button>
        <button class="btn-primary btn-full" id="btn-login">Entrar</button>
      </div>

      <!-- Registro -->
      <div class="auth-form hidden" id="form-register">
        <div class="field">
          <label class="field-label">Nombre</label>
          <input id="reg-name" class="field-input" type="text" placeholder="Tu nombre" autocomplete="name">
        </div>
        <div class="field">
          <label class="field-label">Correo electrónico</label>
          <input id="reg-email" class="field-input" type="email" placeholder="tu@correo.com" autocomplete="email">
        </div>
        <div class="field">
          <label class="field-label">Contraseña</label>
          <input id="reg-password" class="field-input" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
        </div>
        <button class="btn-primary btn-full" id="btn-register">Crear cuenta</button>
      </div>

      <div class="auth-error" id="auth-error"></div>
      <div class="auth-loading hidden" id="auth-loading">
        <div class="spinner"></div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       APP PRINCIPAL
  ══════════════════════════════════════ -->
  <div class="app-screen hidden" id="app-screen">

    <header class="header">
      <div class="header-inner">
        <div class="header-brand">
          <span class="brand-leaf">🌿</span>
          <h1 class="brand-name">Notas <em>Plus</em></h1>
        </div>
        <div class="header-right">
          <div class="header-actions">
            <button class="btn-filter active" data-filter="all">Todas</button>
            <button class="btn-filter" data-filter="pending">Pendientes</button>
            <button class="btn-filter" data-filter="done">Hechas</button>
          </div>
          <div class="user-menu">
            <button class="user-btn" id="user-btn">
              <span class="user-avatar" id="user-avatar">S</span>
            </button>
            <div class="user-dropdown hidden" id="user-dropdown">
              <div class="user-info">
                <span class="user-name" id="user-name-display">—</span>
                <span class="user-email" id="user-email-display">—</span>
              </div>
              <hr class="dropdown-divider">
              <button class="dropdown-item danger" id="btn-logout">Cerrar sesión</button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <div class="stats-bar">
      <div class="stat">
        <span class="stat-num" id="stat-total">0</span>
        <span class="stat-label">notas</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-num" id="stat-pending">0</span>
        <span class="stat-label">pendientes</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-num" id="stat-today">0</span>
        <span class="stat-label">hoy</span>
      </div>
    </div>

    <main class="main">
      <div class="empty-state" id="empty-state">
        <div class="empty-illustration">
          <div class="empty-circle"></div>
          <span class="empty-emoji">🌱</span>
        </div>
        <h2 class="empty-title">Todo tranquilo por aquí</h2>
        <p class="empty-sub">Crea tu primera nota con el botón verde</p>
      </div>
      <div class="notes-grid" id="notes-grid"></div>
    </main>

    <button class="fab" id="fab" aria-label="Nueva nota">
      <span class="fab-icon">+</span>
    </button>
  </div>

  <!-- ══════════════════════════════════════
       MODAL — Crear / Editar nota
  ══════════════════════════════════════ -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Nueva nota</h2>
        <button class="modal-close" id="modal-close">×</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label class="field-label">Título</label>
          <input id="input-title" class="field-input" type="text" placeholder="¿De qué trata esta nota?" maxlength="80" autocomplete="off">
        </div>
        <div class="field">
          <label class="field-label">Descripción</label>
          <textarea id="input-desc" class="field-textarea" placeholder="Añade los detalles que necesites..." rows="4"></textarea>
        </div>
        <div class="field">
          <div class="reminder-toggle-row">
            <label class="field-label">Recordatorio</label>
            <label class="toggle">
              <input type="checkbox" id="toggle-reminder">
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="reminder-fields" id="reminder-fields">
            <div class="datetime-grid">
              <div class="field-inline">
                <label class="field-label-sm">Fecha</label>
                <input id="input-date" class="field-input-sm" type="date">
              </div>
              <div class="field-inline">
                <label class="field-label-sm">Hora</label>
                <input id="input-time" class="field-input-sm" type="time">
              </div>
            </div>
            <p class="reminder-hint" id="reminder-hint"></p>
          </div>
        </div>
        <div class="field">
          <label class="field-label">Color</label>
          <div class="color-picker">
            <button class="color-dot active" data-color="white" style="background:#ffffff"></button>
            <button class="color-dot" data-color="mint"  style="background:#d4f5e2"></button>
            <button class="color-dot" data-color="sage"  style="background:#c8e6c9"></button>
            <button class="color-dot" data-color="lime"  style="background:#e8f5e9"></button>
            <button class="color-dot" data-color="cream" style="background:#fffde7"></button>
            <button class="color-dot" data-color="sky"   style="background:#e3f2fd"></button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="btn-cancel">Cancelar</button>
        <button class="btn-primary" id="btn-save">
          <span id="btn-save-text">Guardar nota</span>
          <div class="spinner hidden" id="save-spinner"></div>
        </button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       MODAL — Detalle de nota
  ══════════════════════════════════════ -->
  <div class="modal-overlay" id="detail-overlay">
    <div class="modal modal-detail">
      <div class="modal-header">
        <span class="detail-badge" id="detail-badge"></span>
        <div class="detail-header-actions">
          <button class="btn-icon" id="detail-edit">✏️</button>
          <button class="btn-icon danger" id="detail-delete">🗑️</button>
          <button class="modal-close" id="detail-close">×</button>
        </div>
      </div>
      <div class="modal-body">
        <h2 class="detail-title" id="detail-title"></h2>
        <p class="detail-desc" id="detail-desc"></p>
        <div class="detail-reminder" id="detail-reminder"></div>
        <div class="detail-meta" id="detail-meta"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-done" id="detail-done"></button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       MODAL — Aviso de recordatorio
  ══════════════════════════════════════ -->
  <div class="modal-overlay alarm-overlay" id="alarm-overlay" style="display:none">
    <div class="modal alarm-modal">
      <div class="alarm-icon">⏰</div>
      <h2 class="alarm-title" id="alarm-title"></h2>
      <p class="alarm-desc" id="alarm-desc"></p>
      <button class="btn-primary" id="alarm-dismiss">Entendido</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Firebase SDK -->
  <script type="module" src="app.js"></script>
</body>
</html>
